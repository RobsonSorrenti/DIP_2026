<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIP 2026 | Fé Corajosa</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // Inicialização com suas chaves reais
        (function(){ emailjs.init("zxg1A3foVUrwo8MgR"); })();

        const firebaseConfig = {
            apiKey: "AIzaSyDa10xZY1W41ABHJjXRjMyalfh6R6rl1P4",
            authDomain: "dip-2026.firebaseapp.com",
            projectId: "dip-2026"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>

    <style>
        :root {
            --primary-green: #458500;
            --hover-green: #5bab00;
            --bg-dark: #0a0a0a;
            --text-white: #ffffff;
            --card-bg: rgba(18, 18, 18, 0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.3s ease; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; }
        .bg-container img { width: 100%; height: 100%; object-fit: cover; }
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.4), rgba(0,0,0,0.8));
            z-index: -1;
        }

        .main-layout {
            flex: 1;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            align-items: center;
            padding: 40px 8%;
            gap: 40px;
        }

        .left-content { display: flex; flex-direction: column; justify-content: flex-end; height: 100%; padding-bottom: 50px; }
        .title-logo-flex { display: flex; align-items: center; gap: 20px; margin-bottom: 10px; }
        .inline-logo { height: 80px; width: auto; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)); }
        .dip-title { font-size: 85px; font-weight: 900; line-height: 1; letter-spacing: -3px; }
        .dip-subtitle { font-size: 22px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; opacity: 0.9; }

        .card-registration {
            background: var(--card-bg);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            box-shadow: -15px 15px 40px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        #countdown-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(69, 133, 0, 0.4);
            padding: 12px;
            border-radius: 12px;
            color: #ffeb3b;
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 25px;
        }

        .event-details { text-align: left; font-size: 14px; line-height: 1.8; margin-bottom: 30px; color: #ccc; }
        .event-details p { margin: 8px 0; display: flex; align-items: center; gap: 10px; }

        .btn-primary {
            width: 100%; padding: 18px; background: var(--primary-green);
            color: #fff; border: none; border-radius: 12px;
            font-weight: 800; text-transform: uppercase; cursor: pointer;
        }
        .btn-primary:hover { background: var(--hover-green); transform: translateY(-2px); }

        input {
            width: 100%; padding: 15px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
            color: #fff; margin-bottom: 12px; font-size: 15px;
        }

        .hidden { display: none; }

        @media (max-width: 992px) {
            .main-layout { grid-template-columns: 1fr; padding: 20px; text-align: center; margin-top: 50px; }
            .title-logo-flex { justify-content: center; flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="bg-container">
        <img src="fundo.png" alt="Fundo DIP">
    </div>
    <div class="bg-overlay"></div>

    <main class="main-layout">
        <div class="left-content">
            <div class="title-logo-flex">
                <img src="logo.png" alt="Logo" class="inline-logo">
                <h1 class="dip-title">DIP 2026</h1>
            </div>
            <div class="dip-subtitle">Fé Corajosa</div>
            <div class="dip-subtitle">No Oriente Médio e Norte da África</div>
        </div>

        <div class="right-content">
            <div class="card-registration">
                
                <div id="inicio">
                    <div id="countdown-box">⏳ Calculando...</div>
                    <div class="event-details">
                        <p>📍 Rua Ana Teles, 826 - Campinho/RJ</p>
                        <p>📅 30/05 (Sáb) • 08h às 20h</p>
                        <p>📅 31/05 (Dom) • 08h às 11h30</p>
                    </div>
                    <button class="btn-primary" onclick="abrirForm()">Fazer Inscrição</button>
                </div>

                <div id="formulario" class="hidden">
                    <input id="nome" placeholder="Nome Completo">
                    <input id="email" placeholder="E-mail" type="email">
                    <input id="tel" placeholder="WhatsApp">
                    <button class="btn-primary" onclick="irPix()">Continuar</button>
                </div>

                <div id="pagamento" class="hidden">
                    <h3>Pagamento Pix</h3>
                    <p style="color:#ffeb3b; font-size:20px; margin: 15px 0;">R$ 30,00</p>
                    <img src="qrcode.png" style="width:150px; background:#fff; padding:5px; border-radius:10px; margin-bottom:15px">
                    <button id="btn-final" class="btn-primary" onclick="confirmar()">Enviar Inscrição</button>
                </div>

                <div id="final" class="hidden">
                    <h2 style="color:var(--primary-green)">Inscrição Enviada!</h2>
                    <p>Verifique seu e-mail.</p>
                </div>

            </div>
        </div>
    </main>

    <script>
        function abrirForm(){
            document.getElementById('inicio').classList.add('hidden');
            document.getElementById('formulario').classList.remove('hidden');
        }
        function irPix(){
            if(!document.getElementById('nome').value) return alert("Informe seu nome.");
            document.getElementById('formulario').classList.add('hidden');
            document.getElementById('pagamento').classList.remove('hidden');
        }

        async function confirmar(){
            const btn = document.getElementById('btn-final');
            const dados = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                tel: document.getElementById('tel').value
            };

            btn.innerText = "Processando...";
            btn.disabled = true;

            try {
                // Salva no Firebase
                await db.collection("inscricoes").add({...dados, data: new Date().toISOString()});

                // Envia EmailJS
                await emailjs.send('service_61svzub', 'template_fdxrswb', {
                    to_name: "Tesouraria ADECAMP",
                    from_name: dados.nome,
                    user_email: dados.email,
                    user_phone: dados.tel
                });

                document.getElementById('pagamento').classList.add('hidden');
                document.getElementById('final').classList.remove('hidden');
            } catch (e) {
                alert("Erro técnico. Tente novamente.");
                console.error(e);
                btn.innerText = "Enviar Inscrição";
                btn.disabled = false;
            }
        }

        // Contador
        const target = new Date("2026-05-30T08:00:00").getTime();
        setInterval(() => {
            const diff = target - new Date().getTime();
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            document.getElementById('countdown-box').innerText = `⏳ Faltam ${d}d ${h}h`;
        }, 1000);
    </script>
</body>
</html>
