<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D.I.P 2026</title>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
(function(){
  emailjs.init("zxg1A3foVUrwo8MgR");
})();

// CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDa10xZY1W41ABHJjXRjMyalfh6R6rl1P4",
  authDomain: "dip-2026.firebaseapp.com",
  projectId: "dip-2026"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)), url('background.png');
  background-size: cover;
  background-position: center;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:rgba(0,0,0,0.85);
  padding:25px;
  border-radius:15px;
  width:90%;
  max-width:400px;
  text-align:center;
}

input,button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:8px;
}

button{
  background:#00c853;
  color:#fff;
  cursor:pointer;
}

.hidden{display:none;}

.logo{width:120px;}

iframe{
  width:100%;
  height:200px;
  border-radius:10px;
}

/* MOBILE */
@media (max-width:600px){
  body{font-size:18px;}
  h1{font-size:32px;}
  h2{font-size:24px;}
}
</style>
</head>

<body>

<div class="container">

<!-- INICIO -->
<div id="inicio">
<h1>D.I.P.</h1>
<h2>2026</h2>
<p><strong>ADECAMP</strong></p>

<img src="logo.png" class="logo">

<p>📅 30 e 31 de maio</p>

<p>
⏰ 30/05: 08h às 20h<br>
⏰ 31/05: 08h às 11h30
</p>

<p style="color:#ffeb3b;">🍽️ Inclui almoço dia 30</p>

<div id="contador"></div>

<button onclick="abrirFormulario()">Clique aqui e faça seu cadastro</button>
</div>

<!-- FORM -->
<div id="formulario" class="hidden">
<input id="nome" placeholder="Nome completo">
<input id="nascimento" type="date">
<input id="email" placeholder="E-mail">
<input id="telefone" placeholder="Telefone">
<button onclick="irPagamento()">Continuar</button>
</div>

<!-- PAGAMENTO -->
<div id="pagamento" class="hidden">
<h3>Pagamento</h3>

<p style="color:#ffeb3b;">🎟️ R$ 30,00</p>

<img src="qrcode.png" style="width:200px;">

<input id="chavePix" value="39.165.116/0001-69" readonly>

<button onclick="copiarPix()">📋 Copiar chave Pix</button>

<div style="background:#ffeb3b; color:#000; padding:10px; border-radius:10px;">
<p><strong>⚠️ Envie o comprovante:</strong></p>
<a href="https://wa.me/552133598007" target="_blank">WhatsApp</a>
<p><strong>Nome:</strong> Tesouraria da Igreja</p>
<p><strong>Descrição:</strong> DIP 2026</p>
</div>

<button onclick="confirmar()">📩 Enviar inscrição</button>
</div>

<!-- FINAL -->
<div id="final" class="hidden">
<h3>📩 Inscrição enviada!</h3>

<p>Status: <strong>Aguardando pagamento</strong></p>

<iframe src="https://www.google.com/maps?q=Rua+Ana+Teles,+826,+Rio+de+Janeiro&output=embed"></iframe>

<a href="https://www.google.com/maps?q=Rua+Ana+Teles,+826,+Rio+de+Janeiro" target="_blank">
<button>📍 Como chegar</button>
</a>

<button onclick="voltarInicio()">🔙 Voltar</button>
</div>

</div>

<script>
// CONTADOR
setInterval(()=>{
let data=new Date("2026-05-30T08:00:00");
let now=new Date();
let diff=data-now;

if(diff<=0){
contador.innerHTML="🔥 Evento iniciado!";
return;
}

let d=Math.floor(diff/(1000*60*60*24));
let h=Math.floor((diff/(1000*60*60))%24);
let m=Math.floor((diff/(1000*60))%60);

contador.innerHTML=`⏳ ${d}d ${h}h ${m}m`;
},1000);

// FUNÇÕES
function abrirFormulario(){
inicio.style.display='none';
formulario.style.display='block';
}

function irPagamento(){
if(!nome.value||!email.value||!telefone.value){
alert('Preencha todos os campos');
return;
}
formulario.style.display='none';
pagamento.style.display='block';
}

function confirmar(){
let nomeUser = nome.value;

// SALVAR NO FIREBASE
db.collection("inscritos").add({
  nome: nomeUser,
  email: email.value,
  telefone: telefone.value,
  status: "pendente",
  data: new Date()
});

// EMAIL
let mensagem = `
Glória a Deus ${nomeUser}!

Sua inscrição foi recebida 🙌

Status: aguardando pagamento

Envie o comprovante para o WhatsApp da igreja.

📅 30 e 31 de maio
`;

emailjs.send("service_61svzub","template_fdxrswb",{
nome:nomeUser,
email:email.value,
mensagem:mensagem
});

pagamento.style.display='none';
final.style.display='block';
}

function copiarPix(){
navigator.clipboard.writeText("39.165.116/0001-69");
alert("Chave Pix copiada!");
}

function voltarInicio(){
final.style.display='none';
inicio.style.display='block';
}
</script>

</body>
</html>
