<style>
:root {
  --primary: #599202;
  --hover: #73bd03;
  --bg-card: rgba(18, 18, 18, 0.95);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #000;
  color: #fff;
  min-height: 100vh;
  overflow-x: hidden;
}

/* FUNDO */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  z-index: -2;
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.8));
  z-index: -1;
}

.container {
  display: flex;
  min-height: 100vh;
  max-width: 1300px;
  margin: auto;
  align-items: center;
  padding: 40px;
}

.left {
  flex: 1.2;
}

.logo {
  width: 110px;
  margin-bottom: 30px;
}

h1 {
  font-size: 100px;
  font-weight: 800;
  line-height: 0.9;
}

.subtitle {
  font-size: 32px;
  letter-spacing: 4px;
  margin-bottom: 20px;
}

.sub-header {
  font-size: 14px;
  letter-spacing: 3px;
  opacity: 0.7;
}

.right {
  flex: 0.8;
  display: flex;
  justify-content: center;
}

.card {
  background: var(--bg-card);
  padding: 40px;
  border-radius: 15px;
  width: 100%;
  max-width: 400px;
  text-align: center;
}

/* 🔥 CONTADOR TOP */
#contador {
  background: rgba(255,255,255,0.07);
  padding: 20px;
  border-radius: 12px;
  color: #d1e2b5;

  font-size: 42px;
  font-weight: 800;
  text-align: center;

  margin-bottom: 25px;
  line-height: 1.2;

  letter-spacing: 1px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.4);
}

#contador b {
  color: #ffffff;
  font-size: 48px;
}

.info-row {
  font-size: 14px;
  margin: 8px 0;
}

.btn {
  width: 100%;
  padding: 16px;
  border-radius: 8px;
  background: var(--primary);
  color: #fff;
  font-weight: 700;
  cursor: pointer;
  margin-top: 20px;
}

input {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

.hidden { display:none; }

/* 📱 MOBILE */
@media (max-width:900px){

  .container {
    flex-direction: column;
    padding:20px;
  }

  h1 { font-size: 65px; }
  .subtitle { font-size: 22px; }

  #contador {
    font-size: 26px;
    padding: 15px;
  }

  #contador b {
    font-size: 30px;
  }
}
</style>
</head>

<body>

<img src="fundo.png" class="bg">
<div class="overlay"></div>

<div class="container">

<div class="left">
<img src="logo.png" class="logo">
<h1>DIP 2026</h1>
<div class="subtitle">Fé Corajosa</div>
<div class="sub-header">No Oriente Médio e Norte da África</div>
</div>

<div class="right">
<div class="card">

<div id="contador">⏳ Calculando...</div>

<div class="info-row">📍 Rua Ana Teles, 826</div>
<div class="info-row">📅 30/05 e 31/05</div>

<button class="btn" onclick="abrir()">Fazer inscrição</button>

</div>
</div>

</div>

<script>
function atualizarContador(){
  const dataEvento = new Date("2026-05-30T08:00:00").getTime();
  const agora = new Date().getTime();
  const diff = dataEvento - agora;

  if(diff <= 0){
    contador.innerHTML = "Evento iniciado!";
    return;
  }

  const dias = Math.floor(diff / (1000*60*60*24));
  const horas = Math.floor((diff%(1000*60*60*24))/(1000*60*60));

  contador.innerHTML = `⏳ <b>${dias}</b> dias e <b>${horas}</b> horas`;
}

setInterval(atualizarContador,1000);
atualizarContador();

function abrir(){
  alert("Fluxo continua aqui 😄");
}
</script>

</body>
</html>
