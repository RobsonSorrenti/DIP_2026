<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIP 2026 | Fé Corajosa</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
(function(){
  emailjs.init("zxg1A3foVUrwo8MgR");
})();

const firebaseConfig = {
  apiKey: "AIzaSyDa10xZY1W41ABHJjXRjMyalfh6R6rl1P4",
  authDomain: "dip-2026.firebaseapp.com",
  projectId: "dip-2026"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<style>
:root {
  --primary: #458500;
  --hover: #5bab00;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', sans-serif;
  background:#000;
  color:#fff;
  min-height:100vh;
}

.bg {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.75);
  z-index:-1;
}

.container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
  padding:20px;
  min-height:100vh;
}

.left {
  flex:1;
  min-width:300px;
  padding:20px;
}

.right {
  flex:1;
  min-width:320px;
  max-width:420px;
}

.card {
  background:rgba(0,0,0,0.85);
  padding:30px;
  border-radius:20px;
}

h1 {
  font-size:60px;
}

.logo {
  width:120px;
  margin-bottom:10px;
}

.btn {
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  background:var(--primary);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.btn:hover { background:var(--hover); }

input {
  width:100%;
  padding:14px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  font-size:16px;
}

.hidden { display:none; }

#contador {
  color:#ffeb3b;
  margin:10px 0;
}

@media(max-width:768px){
  h1 { font-size:40px; }
}
</style>
</head>

<body>

<img src="fundo.png" class="bg">
<div class="overlay"></div>

<div class="container">

<div class="left">
<img src="logo.png" class="logo">
<h1>DIP 2026</h1>
<p>Fé Corajosa</p>

<div id="contador">⏳ Carregando...</div>

<p>📅 30 e 31 de maio</p>
<p>⏰ 30/05: 08h às 20h</p>
<p>⏰ 31/05: 08h às 11h30</p>
<p style="color:#ffeb3b;">🍽️ Inclui almoço dia 30</p>
</div>

<div class="right">
<div class="card">

<div id="inicio">
<button class="btn" onclick="abrir()">Fazer inscrição</button>
</div>

<div id="form" class="hidden">
<input id="nome" placeholder="Nome completo">
<input id="email" placeholder="E-mail">
<input id="tel" placeholder="Telefone">
<button class="btn" onclick="irPagamento()">Continuar</button>
</div>

<div id="pagamento" class="hidden">
<h3>Pagamento</h3>
<p style="color:#ffeb3b;">R$ 30,00</p>

<img src="qrcode.png" style="width:150px; background:#fff; padding:5px; border-radius:10px;">

<input id="pix" value="39.165.116/0001-69" readonly>

<button class="btn" onclick="copiar()">📋 Copiar Pix</button>

<button id="btnEnviar" class="btn" onclick="enviar()">Enviar inscrição</button>
</div>

<div id="final" class="hidden">
<h2>🎉 Inscrição enviada!</h2>
<p>Verifique seu e-mail 🙌</p>
</div>

</div>
</div>

</div>

<script>

// CONTADOR
setInterval(()=>{
let data = new Date("2026-05-30T08:00:00");
let now = new Date();
let diff = data - now;

let d = Math.floor(diff / (1000*60*60*24));
let h = Math.floor((diff/(1000*60*60))%24);

contador.innerHTML = `⏳ ${d} dias e ${h} horas`;
},1000);

// NAVEGAÇÃO
function abrir(){
inicio.classList.add('hidden');
form.classList.remove('hidden');
}

function irPagamento(){
if(!nome.value || !email.value || !tel.value){
alert("Preencha tudo!");
return;
}
form.classList.add('hidden');
pagamento.classList.remove('hidden');
}

// COPIAR PIX
function copiar(){
navigator.clipboard.writeText("39.165.116/0001-69");
alert("Pix copiado!");
}

// ENVIAR
async function enviar(){

const btn = document.getElementById("btnEnviar");

btn.innerText="Enviando...";
btn.disabled=true;

try{

await db.collection("inscritos").add({
nome:nome.value,
email:email.value,
telefone:tel.value,
status:"pendente",
data:new Date()
});

await emailjs.send("service_61svzub","template_fdxrswb",{
nome:nome.value,
email:email.value,
mensagem:"Sua inscrição foi recebida 🙌"
});

pagamento.classList.add('hidden');
final.classList.remove('hidden');

}catch(e){
console.error(e);
alert("Erro ao enviar");
btn.innerText="Enviar inscrição";
btn.disabled=false;
}

}
</script>

</body>
</html>
