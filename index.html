<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIP 2026 | Fé Corajosa</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
(function(){ emailjs.init("zxg1A3foVUrwo8MgR"); })();

const firebaseConfig = { 
  apiKey: "AIzaSy...", 
  authDomain: "dip-2026.firebaseapp.com", 
  projectId: "dip-2026" 
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<style>
:root {
  --primary: #599202;
  --hover: #73bd03;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #000;
  color: #fff;
}

/* FUNDO AJUSTADO */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: 25% center;
  z-index: -2;
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(to right, rgba(0,0,0,0.6), rgba(0,0,0,0.2));
  z-index: -1;
}

.container {
  display: flex;
  min-height: 100vh;
  max-width: 1300px;
  margin: auto;
  align-items: center;
  padding: 40px;
}

.left { flex:1.2; }

.logo { width:110px; margin-bottom:20px; }

h1 { font-size:100px; font-weight:800; }

.subtitle { font-size:30px; margin-bottom:20px; }

.sub-header { font-size:14px; opacity:0.7; }

.right { flex:0.8; display:flex; justify-content:center; }

.card {
  background: rgba(18,18,18,0.95);
  padding:40px;
  border-radius:15px;
  max-width:400px;
  width:100%;
  text-align:center;
}

/* CONTADOR TOP */
#contador {
  background: rgba(255,255,255,0.07);
  padding:20px;
  border-radius:12px;
  font-size:42px;
  font-weight:800;
  margin-bottom:25px;
}

#contador b {
  font-size:48px;
  color:#fff;
}

input {
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:8px;
  border:none;
}

.btn {
  width:100%;
  padding:15px;
  margin-top:15px;
  border:none;
  border-radius:8px;
  background:var(--primary);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.hidden { display:none; }

/* MOBILE */
@media(max-width:900px){

  .container { flex-direction:column; padding:20px; }

  h1 { font-size:60px; }

  #contador { font-size:26px; }

  #contador b { font-size:30px; }

  .bg { object-position:20% center; }
}
</style>
</head>

<body>

<img src="fundo.png" class="bg">
<div class="overlay"></div>

<div class="container">

<div class="left">
<img src="logo.png" class="logo">
<h1>DIP 2026</h1>
<div class="subtitle">Fé Corajosa</div>
<div class="sub-header">No Oriente Médio e Norte da África</div>
</div>

<div class="right">
<div class="card">

<div id="contador">⏳ Calculando...</div>

<div class="info-row">📍 Rua Ana Teles, 826</div>
<div class="info-row">📅 30/05 e 31/05</div>

<!-- INÍCIO -->
<div id="inicio">
<button class="btn" onclick="abrir()">Fazer inscrição</button>
</div>

<!-- FORM -->
<div id="form" class="hidden">
<input id="nome" placeholder="Nome completo">
<input id="email" placeholder="E-mail">
<input id="tel" placeholder="Telefone">
<button class="btn" onclick="irPagamento()">Continuar</button>
</div>

<!-- PAGAMENTO -->
<div id="pagamento" class="hidden">
<h3>Confirmar Inscrição</h3>
<p style="color:#ffeb3b;font-size:24px;">R$ 30,00</p>

<img src="qrcode.png" style="width:150px;background:#fff;padding:10px;border-radius:10px;">

<input id="pix" value="39.116.165/0001-69" readonly onclick="copiar()">

<button class="btn" onclick="copiar()">Copiar Pix</button>
<button class="btn" onclick="enviar()">Finalizar</button>
</div>

<!-- FINAL -->
<div id="final" class="hidden">
<h2>🎉 Quase pronto!</h2>
<p>Verifique seu e-mail.</p>
</div>

</div>
</div>

</div>

<script>
function atualizarContador(){
  const data = new Date("2026-05-30T08:00:00").getTime();
  const agora = new Date().getTime();
  const diff = data - agora;

  if(diff <= 0){
    contador.innerHTML = "Evento iniciado!";
    return;
  }

  const dias = Math.floor(diff/(1000*60*60*24));
  const horas = Math.floor((diff%(1000*60*60*24))/(1000*60*60));

  contador.innerHTML = `⏳ <b>${dias}</b> dias e <b>${horas}</b> horas`;
}

setInterval(atualizarContador,1000);
atualizarContador();

function abrir(){
  inicio.classList.add("hidden");
  form.classList.remove("hidden");
}

function irPagamento(){
  if(!nome.value || !email.value || !tel.value){
    alert("Preencha tudo!");
    return;
  }
  form.classList.add("hidden");
  pagamento.classList.remove("hidden");
}

function copiar(){
  navigator.clipboard.writeText(pix.value);
  alert("Pix copiado!");
}

async function enviar(){
  await db.collection("inscritos").add({
    nome:nome.value,
    email:email.value,
    telefone:tel.value,
    status:"pendente",
    data:new Date()
  });

  inicio.classList.add("hidden");
  pagamento.classList.add("hidden");
  final.classList.remove("hidden");

  alert("Inscrição enviada!");
}
</script>

</body>
</html>
