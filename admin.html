<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel DIP 2026</title>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
emailjs.init("zxg1A3foVUrwo8MgR");

const firebaseConfig = {
  apiKey: "AIzaSyDa10xZY1W41ABHJjXRjMyalfh6R6rl1P4",
  authDomain: "dip-2026.firebaseapp.com",
  projectId: "dip-2026"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#121212;
  color:#fff;
  padding:15px;
}

.container {
  max-width:800px;
  margin:auto;
}

.card {
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  background:#1e1e1e;
}

.pendente { border-left:5px solid red; }
.pago { border-left:5px solid #00c853; }

button {
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#00c853;
  color:#fff;
  cursor:pointer;
  width:100%;
}

.btn-delete {
  background:#d32f2f;
}

canvas {
  background:#fff;
  border-radius:10px;
  margin:10px 0;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login" style="display:flex;justify-content:center;align-items:center;height:100vh;">
  <div style="background:#1e1e1e;padding:30px;border-radius:15px;width:300px;text-align:center;">
    
    <h2>🔐 Acesso Restrito</h2>

    <input id="user" placeholder="Usuário">
    <input id="pass" type="password" placeholder="Senha">

    <button onclick="logar()">Entrar</button>

    <p id="erro" style="color:red;"></p>

  </div>
</div>

<!-- 🎯 PAINEL -->
<div class="container" id="painel" style="display:none;">

<h2>📊 Painel DIP 2026</h2>

<button onclick="sair()" style="background:#555; margin-bottom:10px;">
  🚪 Sair
</button>

<h3 id="contador">👥 Total: 0</h3>

<canvas id="grafico"></canvas>

<input type="text" id="busca" placeholder="🔎 Buscar por nome" onkeyup="filtrar()">

<select id="filtro" onchange="filtrar()">
  <option value="todos">Todos</option>
  <option value="pendente">Pendentes</option>
  <option value="pago">Pagos</option>
</select>

<button onclick="exportar()">📊 Exportar Excel</button>

<div id="lista"></div>

</div>

<script>

// 🔐 LOGIN
function logar(){

  const usuarios = [
    {user:"charles.meuser", pass:"Ana00826#"},
    {user:"robson.sorrenti", pass:"Rocksfor00826"}
  ];

  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  let valido = usuarios.find(x => x.user === u && x.pass === p);

  if(valido){
    document.getElementById("login").style.display = "none";
    document.getElementById("painel").style.display = "block";
  } else {
    document.getElementById("erro").innerText = "Usuário ou senha inválidos!";
  }
}

// 🚪 SAIR
function sair(){
  document.getElementById("painel").style.display = "none";
  document.getElementById("login").style.display = "flex";

  document.getElementById("user").value = "";
  document.getElementById("pass").value = "";
}

let dados = [];
let chart;

// 🔥 FIREBASE
db.collection("inscritos").orderBy("data","desc").onSnapshot(snapshot=>{
  dados = [];
  let pendente = 0;
  let pago = 0;

  snapshot.forEach(doc=>{
    let d = doc.data();
    d.id = doc.id;
    dados.push(d);

    if(d.status === "pago") pago++;
    else pendente++;
  });

  contador.innerHTML = `👥 Total: ${dados.length}`;

  atualizarGrafico(pendente, pago);
  renderizar(dados);
});

// 📊 GRÁFICO
function atualizarGrafico(pendente, pago){
  if(chart) chart.destroy();

  chart = new Chart(grafico, {
    type: 'doughnut',
    data: {
      labels: ['Pendentes','Pagos'],
      datasets: [{
        data: [pendente, pago]
      }]
    }
  });
}

// 🧾 LISTA
function renderizar(listaDados){
  let html = "";

  listaDados.forEach(d=>{

    let qrUrl = d.codigo
      ? `https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(d.codigo)}`
      : "";

    html += `
    <div class="card ${d.status}">
      <strong>${d.nome}</strong><br>
      📧 ${d.email}<br>
      📞 ${d.telefone}<br>
      Status: <b>${d.status}</b><br>

      ${qrUrl ? `<img src="${qrUrl}"><br>` : ""}

      <div style="display:flex;flex-direction:column;gap:6px;">

        <button onclick="confirmar('${d.id}','${d.nome}','${d.email}')">
          ✅ Confirmar pagamento
        </button>

        <button class="btn-delete" onclick="excluir('${d.id}','${d.nome}')">
          🗑️ Excluir
        </button>

      </div>
    </div>
    `;
  });

  lista.innerHTML = html || "Nenhum resultado.";
}

// 🔎 FILTRO
function filtrar(){
  let texto = busca.value.toLowerCase();
  let tipo = filtro.value;

  let filtrados = dados.filter(d=>{
    return (
      d.nome.toLowerCase().includes(texto) &&
      (tipo === "todos" || d.status === tipo)
    );
  });

  renderizar(filtrados);
}

// ✅ CONFIRMAR
function confirmar(id, nome, email){

  db.collection("inscritos").doc(id).update({
    status: "pago"
  });

  emailjs.send("service_61svzub","template_m4c28dc",{
    nome:nome,
    email:email,
    mensagem:"Pagamento confirmado!"
  });

  alert("Pagamento confirmado!");
}

// 🗑️ EXCLUIR
function excluir(id, nome){

  if(!confirm(`Excluir ${nome}?`)) return;

  db.collection("inscritos").doc(id).delete();

  alert("Excluído com sucesso!");
}

// 📊 EXPORTAR
function exportar(){
  let csv = "Nome,Email,Telefone,Status\n";

  dados.forEach(d=>{
    csv += `${d.nome},${d.email},${d.telefone},${d.status}\n`;
  });

  let blob = new Blob([csv]);
  let link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "inscritos.csv";
  link.click();
}

</script>

</body>
</html>
