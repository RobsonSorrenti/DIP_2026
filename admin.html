<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel DIP 2026</title>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- Gráfico -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
emailjs.init("zxg1A3foVUrwo8MgR");

const firebaseConfig = {
  apiKey: "AIzaSyDa10xZY1W41ABHJjXRjMyalfh6R6rl1P4",
  authDomain: "dip-2026.firebaseapp.com",
  projectId: "dip-2026"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#121212;
  color:#fff;
  padding:15px;
}

.container {
  max-width:800px;
  margin:auto;
}

h2 { text-align:center; }

.card {
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  background:#1e1e1e;
}

.pendente { border-left:5px solid red; }
.pago { border-left:5px solid #00c853; }

button {
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#00c853;
  color:#fff;
  cursor:pointer;
  width:100%;
}

canvas {
  background:#fff;
  border-radius:10px;
  margin:10px 0;
}
</style>
</head>

<body>

<div class="container">

<h2>📊 Painel DIP 2026</h2>

<h3 id="contador">👥 Total: 0</h3>

<canvas id="grafico"></canvas>

<input type="text" id="busca" placeholder="🔎 Buscar por nome" onkeyup="filtrar()">

<select id="filtro" onchange="filtrar()">
  <option value="todos">Todos</option>
  <option value="pendente">Pendentes</option>
  <option value="pago">Pagos</option>
</select>

<button onclick="exportar()">📊 Exportar Excel</button>

<div id="lista"></div>

</div>

<script>

let dados = [];
let chart;

// 🔥 FIREBASE
db.collection("inscritos").orderBy("data","desc").onSnapshot(snapshot=>{
  dados = [];
  let pendente = 0;
  let pago = 0;

  snapshot.forEach(doc=>{
    let d = doc.data();
    d.id = doc.id;
    dados.push(d);

    if(d.status === "pago") pago++;
    else pendente++;
  });

  contador.innerHTML = `👥 Total: ${dados.length}`;

  atualizarGrafico(pendente, pago);
  renderizar(dados);
});

// 📊 GRÁFICO
function atualizarGrafico(pendente, pago){

  if(chart) chart.destroy();

  chart = new Chart(grafico, {
    type: 'doughnut',
    data: {
      labels: ['Pendentes','Pagos'],
      datasets: [{
        data: [pendente, pago]
      }]
    }
  });
}

// 🧾 RENDER
function renderizar(listaDados){
  let html = "";

  listaDados.forEach(d=>{

    let qrUrl = d.codigo
      ? `https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(d.codigo)}`
      : "";

    html += `
    <div class="card ${d.status}">
      <strong>${d.nome}</strong><br>
      📧 ${d.email}<br>
      📞 ${d.telefone}<br>
      Status: <b>${d.status}</b><br>

      ${d.usado ? "<p style='color:orange;'>⚠️ Já utilizado</p>" : ""}

      ${qrUrl ? `<img src="${qrUrl}"><br>` : ""}

      ${
        d.status === "pendente"
        ? `<button onclick="confirmar('${d.id}','${d.nome}','${d.email}')">
            ✅ Confirmar pagamento
          </button>`
        : "✔️ Pago"
      }
    </div>
    `;
  });

  lista.innerHTML = html || "Nenhum resultado.";
}

// 🔎 FILTRO
function filtrar(){
  let texto = busca.value.toLowerCase();
  let tipo = filtro.value;

  let filtrados = dados.filter(d=>{
    return (
      d.nome.toLowerCase().includes(texto) &&
      (tipo === "todos" || d.status === tipo)
    );
  });

  renderizar(filtrados);
}

// ✅ CONFIRMAR PAGAMENTO
function confirmar(id, nome, email){

  db.collection("inscritos").doc(id).update({
    status: "pago"
  });

  let mensagem = `
Glória a Deus ${nome}!

Seu pagamento foi confirmado ✅

Sua inscrição no D.I.P 2026 está garantida 🎉
`;

  emailjs.send("service_61svzub","template_m4c28dc",{
    nome: nome,
    email: email,
    mensagem: mensagem
  });

  alert("Pagamento confirmado!");
}

// 📊 EXPORTAR CSV
function exportar(){
  let csv = "Nome,Email,Telefone,Status\n";

  dados.forEach(d=>{
    csv += `${d.nome},${d.email},${d.telefone},${d.status}\n`;
  });

  let blob = new Blob([csv], { type: 'text/csv' });
  let link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = "inscritos.csv";
  link.click();
}

</script>

</body>
</html>
