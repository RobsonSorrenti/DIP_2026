<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel DIP 2026</title>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
emailjs.init("zxg1A3foVUrwo8MgR");

const firebaseConfig = {
  apiKey: "AIzaSyDa10xZY1W41ABHJjXRjMyalfh6R6rl1P4",
  authDomain: "dip-2026.firebaseapp.com",
  projectId: "dip-2026"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#121212;
  color:#fff;
  padding:15px;
}

.container {
  max-width:800px;
  margin:auto;
}

.card {
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  background:#1e1e1e;
}

.pendente { border-left:5px solid red; }
.pago { border-left:5px solid #00c853; }

button {
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#00c853;
  color:#fff;
  cursor:pointer;
  width:100%;
}

.btn-delete {
  background:#d32f2f;
}

canvas {
  background:#fff;
  border-radius:10px;
  margin:10px 0;
}

input, select {
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:none;
}

/* 🔥 INPUT COM ÍCONE */
.input-box {
  position: relative;
  width: 100%;
}

.input-box input {
  width: 100%;
  padding: 10px;
  padding-right: 45px;
  border-radius: 8px;
  border: none;
  box-sizing: border-box;
}

.toggle-password {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  width: 22px;
  height: 22px;
  cursor: pointer;
  background: url('https://cdn-icons-png.flaticon.com/512/709/709612.png') no-repeat center;
  background-size: contain;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login" style="display:flex;justify-content:center;align-items:center;height:100vh;">
  <div style="background:#1e1e1e;padding:30px;border-radius:15px;width:300px;text-align:center;">
    
    <h2>🔐 Acesso Restrito</h2>

<div class="input-box">
  <input id="user" type="text" placeholder="Usuário">
</div>

    <!-- SENHA AJUSTADA -->
    <div class="input-box">
      <input id="pass" type="password" placeholder="Senha">
      <i id="toggleIcon" class="toggle-password" onclick="toggleSenha()"></i>
    </div>

    <button onclick="logar()">Entrar</button>

    <p id="erro" style="color:red;"></p>

  </div>
</div>

<!-- 🎯 PAINEL -->
<div class="container" id="painel" style="display:none;">

<h2>📊 Painel DIP 2026</h2>

<button onclick="sair()" style="background:#555;">
  🚪 Sair
</button>

<h3 id="contador">👥 Total: 0</h3>

<canvas id="grafico"></canvas>

<input type="text" id="busca" placeholder="🔎 Buscar por nome" onkeyup="filtrar()">

<select id="filtro" onchange="filtrar()">
  <option value="todos">Todos</option>
  <option value="pendente">Pendentes</option>
  <option value="pago">Pagos</option>
</select>

<button onclick="exportar()">📊 Exportar Excel</button>

<div id="lista"></div>

</div>

<script>

// 👁️ TOGGLE SENHA (COM TROCA DE ÍCONE)
function toggleSenha(){
  let input = document.getElementById("pass");
  let icon = document.getElementById("toggleIcon");

  if(input.type === "password"){
    input.type = "text";
    icon.style.backgroundImage = "url('https://cdn-icons-png.flaticon.com/512/565/565655.png')";
  } else {
    input.type = "password";
    icon.style.backgroundImage = "url('https://cdn-icons-png.flaticon.com/512/709/709612.png')";
  }
}

// 🔐 LOGIN
function logar(){
const usuarios = [
  {user:"charles.meuser", pass:"Ana00826#"},
  {user:"robson.sorrenti", pass:"Rocksfor00826"},
  {user:"edilaine.brito", pass:"Dip_2026"},
  {user:"mila.santos", pass:"Dip_2026"}
];

  let u = user.value;
  let p = pass.value;

  let valido = usuarios.find(x => x.user === u && x.pass === p);

  if(valido){
    login.style.display = "none";
    painel.style.display = "block";
  } else {
    erro.innerText = "Usuário ou senha inválidos!";
  }
}

// 🚪 SAIR
function sair(){
  painel.style.display = "none";
  login.style.display = "flex";
  user.value = "";
  pass.value = "";
}

let dados = [];
let chart;

// 🔥 FIREBASE
db.collection("inscritos").orderBy("data","desc").onSnapshot(snapshot=>{
  dados = [];
  let pendente = 0;
  let pago = 0;

  snapshot.forEach(doc=>{
    let d = doc.data();
    d.id = doc.id;
    dados.push(d);

    if(d.status === "pago") pago++;
    else pendente++;
  });

  contador.innerHTML = `👥 Total: ${dados.length}`;
  atualizarGrafico(pendente, pago);
  renderizar(dados);
});

// 📊 GRÁFICO
function atualizarGrafico(pendente, pago){
  if(chart) chart.destroy();

  chart = new Chart(grafico, {
    type: 'doughnut',
    data: {
      labels: ['Pendentes','Pagos'],
      datasets: [{ data: [pendente, pago] }]
    }
  });
}

// 🧾 LISTA
function renderizar(listaDados){
  let html = "";

  listaDados.forEach(d=>{
    let qrUrl = d.codigo
      ? `https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(d.codigo)}`
      : "";

    html += `
    <div class="card ${d.status}">
      <strong>${d.nome}</strong><br>
      📧 ${d.email}<br>
      📞 ${d.telefone}<br>
      Status: <b>${d.status}</b><br>

      ${qrUrl ? `<img src="${qrUrl}"><br>` : ""}

      ${
        d.status === "pendente"
        ? `<button onclick="confirmar('${d.id}','${d.nome}','${d.email}')">
            ✅ Confirmar pagamento
          </button>`
        : `<div style="padding:10px;background:#00c853;border-radius:8px;text-align:center;">
            ✔️ Pago
          </div>`
      }

      <button class="btn-delete" onclick="excluir('${d.id}','${d.nome}')">
        🗑️ Excluir
      </button>
    </div>
    `;
  });

  lista.innerHTML = html || "Nenhum resultado.";
}

// 🔎 FILTRO
function filtrar(){
  let texto = busca.value.toLowerCase();
  let tipo = filtro.value;

  let filtrados = dados.filter(d=>{
    return (
      d.nome.toLowerCase().includes(texto) &&
      (tipo === "todos" || d.status === tipo)
    );
  });

  renderizar(filtrados);
}

// ✅ CONFIRMAR
function confirmar(id, nome, email){
  db.collection("inscritos").doc(id).update({ status: "pago" });

  emailjs.send("service_61svzub","template_m4c28dc",{
    nome:nome,
    email:email,
    mensagem:"Pagamento confirmado!"
  });

  alert("Pagamento confirmado!");
}

// 🗑️ EXCLUIR
function excluir(id, nome){
  if(!confirm(`Excluir ${nome}?`)) return;

  db.collection("inscritos").doc(id).delete();
  alert("Excluído!");
}

// 📊 EXPORTAR
function exportar(){
  let csv = "Nome,Email,Telefone,Status\n";

  dados.forEach(d=>{
    csv += `${d.nome},${d.email},${d.telefone},${d.status}\n`;
  });

  let blob = new Blob([csv]);
  let link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "inscritos.csv";
  link.click();
}

</script>

</body>
</html>
