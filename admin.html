<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel DIP 2026</title>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
emailjs.init("zxg1A3foVUrwo8MgR");

const firebaseConfig = {
  apiKey: "AIzaSyDa10xZY1W41ABHJjXRjMyalfh6R6rl1P4",
  authDomain: "dip-2026.firebaseapp.com",
  projectId: "dip-2026"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#121212;
  color:#fff;
  padding:15px;
}

h2 {
  text-align:center;
}

.container {
  max-width:600px;
  margin:auto;
}

.card {
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  background:#1e1e1e;
}

.pendente {
  border-left:5px solid #ff5252;
}

.pago {
  border-left:5px solid #00c853;
}

button {
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#00c853;
  color:#fff;
  cursor:pointer;
  width:100%;
}

button:hover {
  opacity:0.9;
}

/* RESPONSIVO */
@media (max-width:600px){
  body { font-size:16px; }
  h2 { font-size:22px; }
  .card { padding:12px; }
}
</style>
</head>

<body>

<div class="container">

<h2>📋 Painel de Inscritos - DIP 2026</h2>

<div id="lista">Carregando...</div>

</div>

<script>

// LISTAR INSCRITOS
db.collection("inscritos").orderBy("data", "desc").onSnapshot(snapshot=>{
  let html = "";

  if(snapshot.empty){
    lista.innerHTML = "Nenhum inscrito ainda.";
    return;
  }

  snapshot.forEach(doc=>{
    let d = doc.data();

    html += `
    <div class="card ${d.status}">
      <strong>${d.nome}</strong><br>
      📧 ${d.email}<br>
      📞 ${d.telefone}<br>
      🕒 ${new Date(d.data.seconds * 1000).toLocaleString()}<br>
      Status: <b>${d.status}</b><br>

      ${
        d.status === "pendente"
        ? `<button onclick="confirmarPagamento('${doc.id}','${d.nome}','${d.email}')">
            ✅ Confirmar pagamento
          </button>`
        : `<span style="color:#00c853;">✔️ Pagamento confirmado</span>`
      }
    </div>
    `;
  });

  lista.innerHTML = html;
});


// CONFIRMAR PAGAMENTO
function confirmarPagamento(id, nome, email){

  if(!confirm("Confirmar pagamento de " + nome + "?")) return;

  db.collection("inscritos").doc(id).update({
    status: "pago"
  });

  let mensagem = `
Glória a Deus ${nome}!

Seu pagamento foi confirmado ✅

Sua inscrição no D.I.P 2026 está garantida 🎉

📅 30/05 e 31/05
📍 Rua Ana Teles, 826

Te esperamos!
`;

  emailjs.send("service_61svzub","template_m4c28dc",{
    nome: nome,
    email: email,
    mensagem: mensagem
  });

  alert("Pagamento confirmado e email enviado!");
}

</script>

</body>
</html>
